<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleep Dragon</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <main id="view-container"></main>

  <canvas id="petCanvas" width="200" height="200"
          style="display:none; image-rendering:pixelated;"></canvas>

<nav id="bottom-nav">
  <button class="nav-item" data-page="home">
    <span class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
    </span>
    <span class="nav-label">Home</span>
  </button>

  <button class="nav-item" data-page="report">
    <span class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 3v18h18"/>
        <path d="M7 16l4-4 4 4 4-4"/>
      </svg>
    </span>
    <span class="nav-label">Report</span>
  </button>

  <button class="nav-item" data-page="pet-vitals">
    <span class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
      </svg>
    </span>
    <span class="nav-label">Pet Vitals</span>
  </button>

  <button class="nav-item" data-page="profile">
    <span class="nav-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </span>
    <span class="nav-label">Profile</span>
  </button>
</nav>

  <!-- Sleep popup -->
<div id="sleep-popup" class="popup-overlay">
  <div class="popup-box">
    <div id="popup-title" class="popup-title"></div>
    <div class="popup-food-img">
      <img id="popup-food-icon" class="popup-food-icon" src="" alt="Food" />
    </div>
    <div id="popup-rarity-label" class="popup-rarity-label"></div>
    <div class="popup-rating-prompt">How did you sleep last night?</div>
    <div class="popup-smileys" id="popup-smileys">
      <button class="smiley-btn" data-rating="very_bad"  title="Very Bad">😴</button>
      <button class="smiley-btn" data-rating="bad"       title="Bad">😞</button>
      <button class="smiley-btn" data-rating="okay"      title="Okay">😐</button>
      <button class="smiley-btn" data-rating="good"      title="Good">🙂</button>
      <button class="smiley-btn" data-rating="very_good" title="Very Good">😄</button>
    </div>
    <div class="popup-rating-scale">
      <span>Very bad</span><span>Very good</span>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="js/data-loader.js"></script>
<script src="js/dragon.js"></script>
<script src="js/progression.js"></script>
<script src="js/weekly.js"></script>
<script src="js/charts.js"></script>
<script src="js/router.js"></script>
<script src="js/sleep-ratings.js"></script>
<script src="js/app.js"></script>
</body>
</html>
