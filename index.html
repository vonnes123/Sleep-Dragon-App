<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sleep Dragon</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <main id="view-container"></main>

  <canvas id="petCanvas" width="200" height="200"
          style="display:none; image-rendering:pixelated;"></canvas>

  <nav id="bottom-nav">
    <button class="nav-item" data-page="home">Home</button>
    <button class="nav-item" data-page="report">Report</button>
    <button class="nav-item" data-page="pet-vitals">Pet Vitals</button>
    <button class="nav-item" data-page="profile">Profile</button>
  </nav>

  <!-- Sleep popup -->
<div id="sleep-popup" style="display:none; position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0.5); align-items:center; justify-content:center;">
  <div style="
    background: white;
    border-radius: 20px;
    padding: 28px 24px;
    max-width: 320px;
    width: 90%;
    text-align: center;
    margin: 0 auto;
  ">
    <div id="popup-title" style="font-size:15px; color:#333; line-height:1.6; margin-bottom:20px;"></div>

    <div id="popup-food-img" style="margin-bottom:8px; display:flex; justify-content:center;">
      <img id="popup-food-icon" src="" style="width:72px;height:72px;object-fit:contain;image-rendering:pixelated;" />
    </div>

    <div id="popup-rarity-label" style="font-size:14px; font-weight:700; margin-bottom:20px;"></div>

    <div style="font-size:13px; color:#888; margin-bottom:14px;">How did you sleep last night?</div>

    <div id="popup-smileys" style="display:flex; justify-content:center; gap:12px; margin-bottom:4px;">
      <button class="smiley-btn" data-rating="very_bad"  title="Very Bad"  style="font-size:28px; background:none; border:none; cursor:pointer; opacity:0.5; transition:opacity 0.15s, transform 0.15s;">😴</button>
      <button class="smiley-btn" data-rating="bad"       title="Bad"       style="font-size:28px; background:none; border:none; cursor:pointer; opacity:0.5; transition:opacity 0.15s, transform 0.15s;">😞</button>
      <button class="smiley-btn" data-rating="okay"      title="Okay"      style="font-size:28px; background:none; border:none; cursor:pointer; opacity:0.5; transition:opacity 0.15s, transform 0.15s;">😐</button>
      <button class="smiley-btn" data-rating="good"      title="Good"      style="font-size:28px; background:none; border:none; cursor:pointer; opacity:0.5; transition:opacity 0.15s, transform 0.15s;">🙂</button>
      <button class="smiley-btn" data-rating="very_good" title="Very Good" style="font-size:28px; background:none; border:none; cursor:pointer; opacity:0.5; transition:opacity 0.15s, transform 0.15s;">😄</button>
    </div>
    <div style="font-size:10px; color:#bbb; display:flex; justify-content:space-between; padding:0 4px;">
      <span>Very bad</span><span>Very good</span>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="js/data-loader.js"></script>
<script src="js/dragon.js"></script>
<script src="js/progression.js"></script>
<script src="js/weekly.js"></script>
<script src="js/charts.js"></script>
<script src="js/router.js"></script>
<script src="js/sleep-ratings.js"></script>
<script src="js/app.js"></script>
</body>
</html>
