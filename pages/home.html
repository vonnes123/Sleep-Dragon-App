<div class="home">

  <!-- Dragon panel -->
  <div class="home__dragon-panel">
    <div class="home__dragon-header">
      <div>
        <div class="home__dragon-name">Drago</div>
        <div class="home__dragon-sub">Your Sleep Twin</div>
      </div>
    </div>
    <div id="dragon-slot" class="dragon-slot"></div>
  </div>

  <!-- XP bar section -->
  <div class="home__level-section">
    <div class="home__level-row">
      <span id="level-label" class="home__level-label">Level 1</span>
      <span id="xp-fraction" class="home__xp-fraction">0 / 25 XP</span>
    </div>
    <div class="xp-bar-track">
      <div id="xp-bar" class="xp-bar-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Food stash -->
  <div class="home__food-section">
    <div class="home__food-header">
      <span class="home__food-title">Food Stash</span>
      <span id="food-count" class="home__food-count">0 items</span>
    </div>
    <div class="home__food-box">
      <div id="food-grid" class="home__food-grid"></div>
      <div id="food-empty" class="home__food-empty" style="display:none;">
        No food yet — keep sleeping well!
      </div>
    </div>
  </div>

</div>
