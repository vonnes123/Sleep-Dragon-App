<div
  id="dragon-slot"
  style="display: flex; justify-content: center; margin-top: 20px"
></div>

<!-- XP Bar -->
<div id="xp-section" style="padding: 0 24px; margin-top: 16px">
  <div
    id="level-label"
    style="font-size: 13px; margin-bottom: 6px; text-align: center"
  ></div>
  <div
    style="
      background: #333;
      border-radius: 99px;
      height: 12px;
      overflow: hidden;
    "
  >
    <div
      id="xp-bar"
      style="
        height: 100%;
        border-radius: 99px;
        background: #4f7cff;
        transition: width 0.4s ease;
      "
    ></div>
  </div>
</div>

<!-- Food Stash -->
<div style="padding: 0 24px; margin-top: 24px">
  <div style="font-size: 13px; margin-bottom: 10px">Food Stash</div>
  <div
    id="food-grid"
    style="display: flex; flex-wrap: wrap; gap: 8px; padding: 4px"
  ></div>
</div>
