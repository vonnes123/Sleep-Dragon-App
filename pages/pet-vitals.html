<div class="vitals">

    <!-- Page header -->
  <div class="vitals__page-header">
    <div class="vitals__page-title">Pet Vitals</div>
    <div class="vitals__page-sub">Drago's health &amp; evolution</div>
  </div>

  <!-- Status row -->
  <div class="vitals__status-row">
    <img id="vitals-dragon-img"
         src="assets/dragon/dragon-normal.png"
         class="vitals__avatar"
         alt="Dragon" />
    <div id="vitals-status-box" class="vitals__status-card">
      Today Drago is feeling Normal
    </div>
  </div>

            x="0" y="160" width="160" height="0"
            fill="var(--blue)"
            clip-path="url(#dragon-clip)"
            style="transition: y 0.8s ease, height 0.8s ease;"/>
        </svg>
      </div>

      <div class="vitals__evo-info">
        <div id="evo-pct-label" class="vitals__evo-pct">0<span class="vitals__evo-pct-unit">%</span></div>
        <div class="vitals__evo-sub">to next evolution</div>
        <div class="vitals__evo-legend">
          <div class="vitals__evo-legend-item">
            <div class="vitals__evo-swatch" style="background:var(--blue);"></div>
            Achieved
          </div>
          <div class="vitals__evo-legend-item">
            <div class="vitals__evo-swatch" style="background:rgba(255,255,255,0.08);"></div>
            Remaining
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Tip card -->
  <div id="vitals-tip" class="vitals__tip-card"></div>

  <!-- Food history -->
  <div class="vitals__food-section">
    <div class="vitals__food-header">
      <span class="vitals__food-title">Food History</span>
      <span class="vitals__food-sub">Last 12 items consumed</span>
    </div>
    <div id="food-history-grid" class="home__food-grid"></div>
    <div id="food-history-empty" class="home__food-empty" style="display:none;">
      No food eaten yet — feed your dragon!
    </div>
  </div>

</div>
