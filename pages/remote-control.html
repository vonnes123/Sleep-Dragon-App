<div>

  <div class="rc-section">
    <button id="btnNextDayAdvance" class="btn-primary">🌅 Next Day</button>
  </div>

  <div class="rc-section">
    <button id="btnGiveFood" class="btn-default">🍖 Give Random Food</button>
  </div>

  <div class="rc-section">
  <button id="btnSendNotification" class="btn-primary">🔔 Send Sleep Nudge</button>
</div>

  <div class="rc-section">
    <div class="rc-title">Data Entry</div>
    <div class="rc-entry-nav">
      <button id="btnPrevDay" class="btn-default">← Prev</button>
      <span id="current-entry" class="rc-entry-label">Entry 50</span>
      <button id="btnNextDay" class="btn-default">Next →</button>
    </div>
  </div>

  <div class="rc-section">
    <div class="rc-title">Dragon Mode</div>
    <div class="rc-btn-group">
      <button class="btn-default" data-mode="normal">Normal</button>
      <button class="btn-default" data-mode="tired">Tired</button>
      <button class="btn-default" data-mode="energetic">Energetic</button>
    </div>
  </div>

  <div class="rc-section">
    <div class="rc-title">Animations</div>
    <div class="rc-btn-group">
      <button class="btn-default" data-anim="fall_asleep" data-loops="1" data-next="sleep">Fall Asleep</button>
      <button class="btn-default" data-anim="wake_up"     data-loops="1">Wake Up</button>
      <button class="btn-default" data-anim="level_up"    data-loops="1">Level Up</button>
    </div>
    <div class="rc-btn-group" style="margin-top:8px;">
      <button class="btn-default" data-anim="anticipate_food" data-loops="Infinity">Anticipating Food</button>
      <button class="btn-default" data-anim="chew"            data-loops="2">Eating</button>
    </div>
  </div>

</div>
