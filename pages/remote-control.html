<h1>Remote Control</h1>

<div style="text-align:center; margin-bottom: 16px;">
  <button id="btnGiveFood">🍖 Give Random Food</button>
</div>

<div style="text-align:center;">
  <div>
    <button data-mode="normal">Normal</button>
    <button data-mode="tired">Tired</button>
    <button data-mode="energetic">Energetic</button>
  </div>
  <div style="margin-top:8px;">
    <button data-anim="fall_asleep" data-loops="1" data-next="sleep">Fall Asleep</button>
    <button data-anim="wake_up"     data-loops="1">Wake Up</button>
    <button data-anim="level_up"    data-loops="1">Level Up</button>
  </div>
  <div style="margin-top:8px;">
    <button data-anim="anticipate_food" data-loops="Infinity">Anticipating Food</button>
    <button data-anim="chew"            data-loops="2">Eating</button>
  </div>
</div>
