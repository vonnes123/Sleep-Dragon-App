<div class="report-subpage">

    <div class="section-header">Sleep Over Time</div>
  <div class="chart-legend">
    <span class="legend-group-label">Actual</span>
    <div class="legend-item"><div class="legend-swatch" style="background:#1a3a6e;"></div>Deep</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#a8c4f5;"></div>Light</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#6da8e0;"></div>REM</div>
    <span style="color:var(--border-light);">|</span>
    <span class="legend-group-label--predicted">Predicted</span>
    <div class="legend-item"><div class="legend-swatch" style="background:#8B5A00;"></div>Deep</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#FFD580;"></div>Light</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#FFB347;"></div>REM</div>
    <span style="color:var(--border-light);">|</span>
    <div class="legend-item"><div class="legend-line" style="background:#2ecc71;"></div>HRV</div>
    <div class="legend-item"><div class="legend-line" style="background:#e05c7a;"></div>BPM</div>
  </div>

  <div class="chart-wrap chart-wrap--lg">
    <canvas id="chart-monthly-sleep"></canvas>
  </div>
  <div id="monthly-sleep-subtitle" class="chart-subtitle"></div>

  <div class="toggle-row">
    <div class="toggle-item">
      <div class="toggle-track on" id="mtrack-stages"><div class="toggle-thumb"></div></div>
      Sleep Stages
    </div>
    <div class="toggle-item">
      <div class="toggle-track on" id="mtrack-hrv"><div class="toggle-thumb"></div></div>
      HRV
    </div>
    <div class="toggle-item">
      <div class="toggle-track on" id="mtrack-bpm"><div class="toggle-thumb"></div></div>
      BPM
    </div>
  </div>

    <div class="section-header">Bedtime Routine</div>
  <div class="chart-legend">
    <span class="legend-group-label">Actual</span>
    <div class="legend-item"><div class="legend-line" style="background:#4f7cff;"></div>Bedtime</div>
    <div class="legend-item"><div class="legend-line" style="background:#a8c4f5;"></div>Fall asleep</div>
    <span style="color:var(--border-light);">|</span>
    <span class="legend-group-label--predicted">Predicted</span>
    <div class="legend-item"><div class="legend-line" style="background:#8B4513;"></div>Bedtime</div>
    <div class="legend-item"><div class="legend-line" style="background:#FFB347;"></div>Fall asleep</div>
  </div>

  <div class="chart-wrap chart-wrap--sm">
    <canvas id="chart-monthly-bedtime"></canvas>
  </div>
  <div class="chart-subtitle">Later times appear higher. Days beyond 7-day window left empty.</div>

    <div class="section-header">Sleep Score</div>
  <div id="monthly-eff-avg" class="stat-avg-label"></div>
  <div class="chart-legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#4f7cff;"></div>Actual</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#FFB347;"></div>Predicted</div>
    <div class="legend-item"><div class="legend-line" style="background:#e05c7a;"></div>Avg</div>
  </div>

  <div class="chart-wrap chart-wrap--sm">
    <canvas id="chart-monthly-efficiency"></canvas>
  </div>

</div>
